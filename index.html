<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayRaya UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 15px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .balance-card {
      margin-top: 15px;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: white;
      border-radius: 20px;
      padding: 20px;
    }

    .balance-card h3 {
      margin: 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .balance {
      font-size: 24px;
      font-weight: bold;
      margin: 10px 0;
    }

    .menu {
      margin-top: 20px;
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .menu-item {
      text-align: center;
      font-size: 12px;
    }

    .icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      margin-bottom: 5px;
      font-size: 20px;
      color: white;
    }

    .blue { background: #2196f3; }
    .orange { background: #ff9800; }
    .green { background: #4caf50; }
    .red { background: #f44336; }
    .purple { background: #9c27b0; }
    .teal { background: #009688; }

    .badge {
      position: absolute;
      background: orange;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 6px;
      top: -5px;
      right: -5px;
    }

    .relative {
      position: relative;
      display: inline-block;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h2>Halo, hasanudin</h2>
      <small>Selamat pagi</small>
    </div>
    <div>🔔</div>
  </div>

  <div class="balance-card">
    <h3>Saldo Aktif</h3>
    <div class="balance">Rp 929.077.177</div>
    <small>PayRaya ID: 081395545025</small>
  </div>

  <div class="menu">
    <div class="menu-item">
      <div class="icon blue">✈️</div>
      Transfer
    </div>
    <div class="menu-item">
      <div class="icon orange">⬇️</div>
      Top Up
    </div>
    <div class="menu-item">
      <div class="icon green">💳</div>
      Bayar
    </div>
    <div class="menu-item">
      <div class="icon red">💼</div>
      Tarik
    </div>

    <div class="menu-item">
      <div class="icon purple">🐷</div>
      Deposito
    </div>
    <div class="menu-item">
      <div class="icon teal">📱</div>
      E-Money
    </div>

    <div class="menu-item">
      <div class="relative">
        <div class="icon red">➕</div>
        <div class="badge">BARU</div>
      </div>
      Pinjaman
    </div>

    <div class="menu-item">
      <div class="relative">
        <div class="icon purple">🌐</div>
        <div class="badge">AKTIF</div>
      </div>
      Paylater
    </div>
  </div>

</div>

</body>
</html>
